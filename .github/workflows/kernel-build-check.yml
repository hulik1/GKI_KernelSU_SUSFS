name: Kernel Build Check

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      susfs_version:
        description: 'SUSFS Version'
        required: false
        type: choice
        options:
          - 'v1.5.9'
          - 'v1.5.12'
        default: 'v1.5.12'

jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        kernel_config:
          # Android 12 - Kernel 5.10.43 (Oldest)
          - android_version: "android12"
            kernel_version: "5.10"
            sub_level: "43"
            os_patch_level: "2021-08"
          
          # Android 12 - Kernel 5.10 LTS (Latest)
          - android_version: "android12"
            kernel_version: "5.10"
            sub_level: "X"
            os_patch_level: "lts"

    name: Build Check
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ matrix.kernel_config.android_version }}
      kernel_version: ${{ matrix.kernel_config.kernel_version }}
      sub_level: ${{ matrix.kernel_config.sub_level }}
      os_patch_level: ${{ matrix.kernel_config.os_patch_level }}
      susfs_version: ${{ inputs.susfs_version }}
