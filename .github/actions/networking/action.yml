name: 'Setup Networking Options'
description: 'Set up kernel configuration fragment with required options'
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.1)'
    required: true
  android_version:
    description: 'Android version (e.g., android14)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Patch with BBRv3
      if: false
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        set -euo pipefail
        cp -f "${{ github.workspace }}/kernel_patches/bbr/bbrv3-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch" .
        patch -p1 < bbrv3-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch

    - name: Fix modules.bzl
      shell: bash
      if: false
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
          mods_file=modules.bzl
          for m in "net/ipv4/tcp_bic.ko" "net/ipv4/tcp_htcp.ko" "net/ipv4/tcp_westwood.ko"; do
            grep -q "'$m'" "$mods_file" && continue
            sed -i "/_ARM64_GKI_MODULES_LIST = \[/,/^]/ s/^]/    \"$m\",\n]/" "$mods_file"
          done
        fi

    - name: Apply Netfilter Base Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_NETFILTER=y
        CONFIG_NETFILTER_ADVANCED=y
        CONFIG_NETFILTER_XTABLES=y
        CONFIG_NF_CONNTRACK=y
        EOF

        if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
          echo "# CONFIG_NF_TABLES is not set" >> "${{ github.workspace }}/wild_gki.fragment"
        else
          echo "CONFIG_NF_TABLES=y" >> "${{ github.workspace }}/wild_gki.fragment"
        fi

    - name: Apply IP Tables Extensions
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y
        EOF

    - name: Apply IP Set Base
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_IP_SET=y
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_IP_SET_MAX=256
        EOF

    - name: Apply TCP Congestion Control
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_TCP_CONG_CUBIC=y
        CONFIG_TCP_CONG_BIC=y
        CONFIG_TCP_CONG_WESTWOOD=y
        CONFIG_TCP_CONG_HTCP=y
        CONFIG_DEFAULT_BBR=y
        CONFIG_DEFAULT_TCP_CONG="bbr"
        CONFIG_NET_SCH_FQ=y
        EOF

    - name: Apply Kernel Config for 5.10
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      if: inputs.kernel_version == '5.10'
      run: |
        sed -i 's/CONFIG_IP_SET_MAX/256/g' net/netfilter/ipset/ip_set_core.c
        