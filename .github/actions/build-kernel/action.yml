name: 'Build Kernel'
description: 'Builds kernel using legacy build.sh or Bazel (kleaf)'

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
        export PATH="/usr/lib/ccache:$PATH"
        # For build.sh, force CC/CXX to use ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        if [ -f "build/build.sh" ]; then
          SKIP_MRPROPER=1 SKIP_EXT_MODULES=1 SKIP_CP_KERNEL_HDR=1 GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment" BUILD_CONFIG=common/build.config.gki.aarch64 CC="$CC" CXX="$CXX" build/build.sh
        else
          cp "$GITHUB_WORKSPACE/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
          tools/bazel build --config=release --notrim --use_ccache --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment //common:kernel_aarch64
        fi
